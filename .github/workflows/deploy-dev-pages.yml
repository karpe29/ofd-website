# Build and publish the dev preview to GitHub Pages on push to dev.
#
# One-time repo setup (GitHub → Settings → Pages):
#   Source: "GitHub Actions"

name: Deploy dev (GitHub Pages)

on:
  push:
    branches: [dev]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-dev
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Omit blog gallery images (~1.2 GB) so the Pages artifact stays under GitHub's ~1 GB limit.
      - name: Build site
        env:
          CI_PAGES_OMIT_BLOG: "true"
        run: npm run build

      - name: Add .nojekyll
        run: touch build/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
